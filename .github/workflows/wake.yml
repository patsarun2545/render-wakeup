name: Wake Render

on:
  schedule:
    - cron: '50 0 * * *'      # 07:50 น. ปลุก
    - cron: '*/14 1-11 * * *' # 08:00-18:00 น. ping ทุก 14 นาที
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dress-rental-web
        run: curl --max-time 60 https://dress-rental-web.onrender.com/ping || true

      - name: Ping rental-management-system
        run: curl --max-time 60 https://rental-management-system-8wzu.onrender.com/ping || true
