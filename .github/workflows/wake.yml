name: Wake Render

on:
  schedule:
    - cron: '50 0 * * *'    # 07:50 Bangkok (UTC+7)
    - cron: '*/14 1-10 * * *'  # 08:00-17:59 Bangkok
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Ping dress-rental-web
        run: curl --max-time 90 https://dress-rental-web.onrender.com/ping || true

      - name: Ping rental-management-system
        run: curl --max-time 90 https://rental-management-system-8wzu.onrender.com/ping || true

      - name: Log result
        run: echo "Pinged at $(TZ='Asia/Bangkok' date)"
