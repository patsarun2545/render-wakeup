name: Wake Render

on:
  schedule:
    - cron: '0 13 * * *'
      timezone: "Asia/Bangkok"
    - cron: '*/14 13-17 * * *'
      timezone: "Asia/Bangkok"
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dress-rental-web
        run: curl --max-time 90 https://dress-rental-web.onrender.com/ping || true
      - name: Ping rental-management-system
        run: curl --max-time 90 https://rental-management-system-8wzu.onrender.com/ping || true
