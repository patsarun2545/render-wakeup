name: Wake Render
on:
  schedule:
    - cron: '45 0 * * *'  # 07:45 Bangkok (UTC+7)
    - cron: '50 0 * * *'  # 07:50 Bangkok (UTC+7)
    - cron: '55 0 * * *'  # 07:55 Bangkok (UTC+7)
  workflow_dispatch:

concurrency:
  group: wake-render
  cancel-in-progress: true

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping dress-rental-web
        run: |
          for i in 1 2 3; do
            curl --max-time 90 -f https://dress-rental-web.onrender.com/ping && break
            echo "Retry $i failed, waiting..."
            sleep 10
          done
      - name: Ping rental-management-system
        run: |
          for i in 1 2 3; do
            curl --max-time 90 -f https://rental-management-system-8wzu.onrender.com/ping && break
            echo "Retry $i failed, waiting..."
            sleep 10
          done
      - name: Log result
        run: echo "Pinged at $(TZ='Asia/Bangkok' date)"
